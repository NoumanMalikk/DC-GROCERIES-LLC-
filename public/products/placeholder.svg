<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Product image placeholder">
  <title>Product Image Placeholder</title>
  <rect width="800" height="800" fill="#F8F2E7" />
  <rect x="32" y="32" width="736" height="736" rx="24" fill="none" stroke="#18332C" stroke-width="3" stroke-dasharray="12 8" />
  <rect x="48" y="48" width="704" height="704" rx="16" fill="none" stroke="#18332C" stroke-width="1.5" opacity="0.35" />
  <!-- Subtle produce outline -->
  <g transform="translate(400 300)" fill="none" stroke="#386641" stroke-width="2.5" opacity="0.35">
